<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CampusCare — Student Management</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="/Assets/Images/logo.png" type="image/png">
    <link rel="stylesheet" href="/Assets/Admin_dashboard/user_page/style.css">
</head>
<body>
    <div class="drawer-overlay" id="overlay"></div>
    <nav class="drawer" id="drawer">
        <div class="drawer-header">
            <div class="drawer-profile">
                <div class="drawer-avatar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.8">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <div class="drawer-info">
                    <div class="drawer-name">Administrator</div>
                    <div class="drawer-role">Campus Care Admin</div>
                </div>
                <span class="drawer-badge">Admin</span>
            </div>
        </div>
        <div class="drawer-nav">
            <button class="drawer-item" data-page="dashboard">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>
                <span>Dashboard</span>
            </button>
            <button class="drawer-item" data-page="incidents">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                </svg>
                <span>Incidents</span>
            </button>
            <button class="drawer-item active" data-page="users">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span>Users</span>
            </button>
            <hr class="drawer-divider">
            <button class="drawer-item" data-page="settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
                </svg>
                <span>Settings</span>
            </button>
        </div>
        <div class="drawer-footer">
            <button class="drawer-logout" id="logoutBtn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </nav>

    <header class="topbar">
        <div class="topbar-left" style="display: flex; align-items: center; gap: 12px;">
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
            <div class="brand">
                <div class="brand-logo"><img src="/Assets/Images/logo.png" alt="CampusCare" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%231D9E75\'%3E%3Cpath d=\'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5\'/%3E%3C/svg%3E'"></div>
                <span class="brand-name">CampusCare</span>
            </div>
        </div>
        <button class="admin-pill" id="adminPill">Admin</button>
    </header>

    <main class="users-section">
        <div class="page-header">
            <h1 class="page-title">Student Management</h1>
            <p class="page-sub">Manage student accounts, view profiles, and track activity</p>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1D9E75"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
                <div class="stat-info"><div class="stat-number" id="totalStudents">0</div><div class="stat-label">Total Students</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563EB"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                <div class="stat-info"><div class="stat-number" id="activeStudents">0</div><div class="stat-label">Active Students</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D97706"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
                <div class="stat-info"><div class="stat-number" id="totalReports">0</div><div class="stat-label">Total Reports</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C3AED"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
                <div class="stat-info"><div class="stat-number" id="avgReports">0</div><div class="stat-label">Avg Reports/Student</div></div>
            </div>
        </div>

        <div class="section-hdr">
            <h2 class="section-title">Student Directory</h2>
            <button class="add-student-btn" id="addStudentBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Student
            </button>
        </div>

        <div class="table-wrap">
            <table>
                <thead><tr><th>Student</th><th>ID Number</th><th>Course/Year</th><th>Reports</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="studentsTableBody"></tbody>
            </table>
        </div>
    </main>

    <div class="modal-overlay" id="studentModal">
        <div class="modal">
            <div class="modal-header"><h3 class="modal-title" id="modalTitle">Add New Student</h3><button class="modal-close" id="closeModalBtn">&times;</button></div>
            <form id="studentForm">
                <input type="hidden" id="studentId">
                <div class="form-group"><label>Full Name</label><input type="text" id="studentFullName" required placeholder="e.g., Juan Dela Cruz"></div>
                <div class="form-group"><label>ID Number</label><input type="text" id="studentIdNumber" required placeholder="e.g., 2024-00123"></div>
                <div class="form-group"><label>Course</label><select id="studentCourse" required><option value="">Select Course</option><option value="BSCS">BSCS - Computer Science</option><option value="BSIT">BSIT - Information Technology</option><option value="BSIS">BSIS - Information Systems</option><option value="BSECE">BSECE - Electronics Engineering</option><option value="BSME">BSME - Mechanical Engineering</option><option value="BSCE">BSCE - Civil Engineering</option><option value="BSA">BSA - Accountancy</option><option value="BSBA">BSBA - Business Administration</option></select></div>
                <div class="form-group"><label>Year Level</label><select id="studentYear" required><option value="">Select Year</option><option value="1">1st Year</option><option value="2">2nd Year</option><option value="3">3rd Year</option><option value="4">4th Year</option></select></div>
                <div class="form-group"><label>Email</label><input type="email" id="studentEmail" required placeholder="student@campus.edu"></div>
                <div class="form-group"><label>Status</label><select id="studentStatus"><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
                <button type="submit" class="modal-submit">Save Student</button>
            </form>
        </div>
    </div>
<script src="/Assets/Admin_dashboard/user_page/function.js"></script>
</body>
</html>
