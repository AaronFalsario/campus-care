<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title data-i18n="dashboard_title">Campus Care — Student Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/Assets/Images/logo.png" type="image/png">
<link rel="stylesheet" href="/Assets/Student_dashboard/SDB.css">
<base href="/">
</head>
<body>
<div class="drawer-overlay" id="overlay"></div>
<div class="drawer" id="drawer">
    <div class="drawer-header">
        <div class="drawer-avatar" id="avatarUpload">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </div>
        <div class="drawer-name" id="studentName">Loading...</div>
        <div class="drawer-role">Student</div>
        <div class="drawer-student-id" id="studentNumber">Loading...</div>
    </div>
    <div class="drawer-nav">
        <button class="drawer-item active" data-page="dashboard">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span data-i18n="dashboard">Dashboard</span>
        </button>
        <button class="drawer-item" onclick="window.location.href='/Assets/Student_reporting/report.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
            <span data-i18n="report">New Report</span>
        </button>
    <hr class="drawer-divider">
    <button class="drawer-item" onclick="window.location.href='/Assets/Student_dashboard/setting/setting.html'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
            </svg>
            <span data-i18n="settings">Settings</span>
    </button>
    </div>
    <div class="drawer-footer">
        <button class="drawer-logout" id="logoutBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span data-i18n="logout">Logout</span>
        </button>
    </div>
</div>

<header class="topbar">
    <div class="brand-logo">
        <img src="/Assets/Images/logo.png" alt="Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http:/www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%232563EB\'%3E%3Cpath d=\'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5\'/%3E%3C/svg%3E'">
        <span class="brand-name">CampusCare</span>
    </div>
    
    <!-- Action Buttons Container -->
    <div class="action-buttons">
        <!-- Notification Button -->
        <button class="action-btn notification-btn" id="notificationBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
        </button>
        
        <!-- Dark Mode Toggle Button -->
        <button class="action-btn darkmode-btn" id="darkModeToggle">
            <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>
</header>

<div class="main-content">
    <div class="hero">
        <div class="hero-title" id="welcomeMessage">Welcome back! 👋</div>
        <div class="hero-date">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span id="currentDate"></span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-header">
                <div class="stat-icon your">📋</div>
            </div>
            <div class="stat-value" id="yourReportsCount">0</div>
            <div class="stat-label" data-i18n="your_reports">Your Reports</div>
        </div>
        <div class="stat-card">
            <div class="stat-header">
                <div class="stat-icon progress">⚙️</div>
            </div>
            <div class="stat-value" id="inProgressCount">0</div>
            <div class="stat-label" data-i18n="in_progress">In Progress</div>
        </div>
        <div class="stat-card">
            <div class="stat-header">
                <div class="stat-icon resolved">✓</div>
            </div>
            <div class="stat-value" id="resolvedCount">0</div>
            <div class="stat-label" data-i18n="resolved">Resolved</div>
        </div>
        <div class="stat-card">
            <div class="stat-header">
                <div class="stat-icon total">🏫</div>
            </div>
            <div class="stat-value" id="totalReportsCount">0</div>
            <div class="stat-label" data-i18n="total_campus_reports">Total Campus Reports</div>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-chip active" data-filter="all" data-i18n="all_reports">All Reports</button>
        <button class="filter-chip" data-filter="security" data-i18n="security">Security</button>
        <button class="filter-chip" data-filter="maintenance" data-i18n="maintenance">Maintenance</button>
        <button class="filter-chip" data-filter="janitorial" data-i18n="janitorial">Janitorial</button>
        <button class="filter-chip" data-filter="facilities" data-i18n="facilities">Facilities</button>
    </div>

    <div class="section-header"><h2 class="section-title" data-i18n="recent_incidents">Recent Incidents</h2><span class="section-count" id="incidentsCount">0 reports</span></div>
    <div class="incidents-grid" id="incidentsContainer"></div>
</div>

<!-- BOTTOM NAVIGATION BAR FOR MOBILE -->
<nav class="bottom-nav" id="bottomNav">
    <button class="bottom-nav-item active" data-page="dashboard">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span data-i18n="home">Home</span>
    </button>
    <button class="bottom-nav-item" data-page="report">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 5v14M5 12h14"/>
            <circle cx="12" cy="12" r="9"/>
        </svg>
        <span data-i18n="report">Report</span>
    </button>
    <button class="bottom-nav-item" data-page="settings">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
        </svg>
        <span data-i18n="settings">Settings</span>
    </button>
</nav>

<!-- INCIDENT DETAIL MODAL -->
<div id="incidentModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header"><h3 data-i18n="incident_details">📋 Incident Details</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <div class="modal-body">
            <div class="modal-row"><div class="modal-label" data-i18n="title">Title</div><div class="modal-value" id="modalTitle"></div></div>
            <div class="modal-row"><div class="modal-label" data-i18n="location">Location</div><div class="modal-value" id="modalLocation"></div></div>
            <div class="modal-row"><div class="modal-label" data-i18n="category">Category</div><div class="modal-value" id="modalCategory"></div></div>
            <div class="modal-row"><div class="modal-label" data-i18n="priority">Priority</div><div class="modal-value" id="modalPriority"></div></div>
            <div class="modal-row"><div class="modal-label" data-i18n="status">Status</div><div class="modal-value" id="modalStatus"></div></div>
            <div class="modal-row"><div class="modal-label" data-i18n="description">Description</div><div class="modal-value">📄 <span id="modalDescription"></span></div></div>
            <div class="modal-row"><div class="modal-label" data-i18n="date">Reported</div><div class="modal-value" id="modalDate"></div></div>
        </div>
        <div class="modal-footer"><button class="modal-btn modal-btn-primary" onclick="closeModal()" data-i18n="close">Close</button></div>
    </div>
</div>

<script type="module" src="/Assets/Student_dashboard/SDB.js"></script>
</body>
</html>
