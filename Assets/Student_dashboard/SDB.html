<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Campus Care — Student Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/Assets/Images/logo.png" type="image/png">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
        --bg: #F0F4F8;
        --surface: #FFFFFF;
        --border: #E2E8F0;
        --text: #1E293B;
        --muted: #64748B;
        --primary: #2563EB;
        --primary-light: #DBEAFE;
        --primary-dark: #1D4ED8;
        --primary-bg: #EFF6FF;
        --secondary: #3B82F6;
        --secondary-light: #EFF6FF;
        --red: #EF4444;
        --red-light: #FEE2E2;
        --amber: #F59E0B;
        --amber-light: #FEF3C7;
        --green: #10B981;
        --green-light: #D1FAE5;
        --purple: #8B5CF6;
        --purple-light: #EDE9FE;
        --navy: #1E3A5F;
        --navy-dark: #0F172A;
        --drawer-bg: #1E3A5F;
        --drawer-header: #2563EB;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
        line-height: 1.5;
        min-height: 100vh;
    }

    /* DRAWER - BLUE THEME */
    .drawer {
        position: fixed;
        top: 0;
        left: 0;
        width: 280px;
        height: 100vh;
        background: var(--drawer-bg);
        z-index: 300;
        display: flex;
        flex-direction: column;
        box-shadow: 4px 0 24px rgba(0,0,0,0.08);
        transition: transform 0.3s ease;
    }

    .drawer-header {
        padding: 32px 24px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        text-align: center;
        background: linear-gradient(135deg, #2563EB, #1D4ED8);
    }

    .drawer-avatar {
        width: 80px;
        height: 80px;
        margin: 0 auto 16px;
        background: #3B82F6;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 3px solid rgba(255,255,255,0.2);
        cursor: pointer;
        transition: transform 0.2s;
        overflow: hidden;
    }
    .drawer-avatar:hover { transform: scale(1.05); }
    .drawer-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .drawer-avatar svg {
        width: 40px;
        height: 40px;
        stroke: white;
    }

    .drawer-name {
        font-size: 18px;
        font-weight: 700;
        color: white;
        margin-bottom: 4px;
    }

    .drawer-role {
        font-size: 12px;
        color: rgba(255,255,255,0.7);
    }

    .drawer-nav {
        flex: 1;
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .drawer-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 20px;
        border-radius: 12px;
        color: rgba(255,255,255,0.75);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
    }

    .drawer-item svg {
        stroke: rgba(255,255,255,0.75);
        width: 20px;
        height: 20px;
    }

    .drawer-item:hover {
        background: rgba(59,130,246,0.2);
        color: white;
    }

    .drawer-item:hover svg {
        stroke: white;
    }

    .drawer-item.active {
        background: rgba(59,130,246,0.25);
        color: white;
    }

    .drawer-item.active svg {
        stroke: white;
    }

    .drawer-divider {
        height: 1px;
        background: rgba(255,255,255,0.1);
        margin: 8px 16px;
    }

    .drawer-footer {
        padding: 20px 24px;
        border-top: 1px solid rgba(255,255,255,0.08);
    }

    .drawer-logout {
        display: flex;
        align-items: center;
        gap: 12px;
        color: rgba(255,255,255,0.6);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        background: none;
        border: none;
        width: 100%;
        padding: 10px 0;
        transition: all 0.2s;
    }

    .drawer-logout svg {
        stroke: rgba(255,255,255,0.6);
        width: 18px;
        height: 18px;
    }

    .drawer-logout:hover {
        color: #EF4444;
    }

    .drawer-logout:hover svg {
        stroke: #EF4444;
    }

    /* TOPBAR */
    .topbar {
        margin-left: 280px;
        padding: 16px 32px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px;
    }

    .hamburger span {
        width: 22px;
        height: 2px;
        background: var(--text);
        border-radius: 2px;
    }

    .brand-logo {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .brand-logo img {
        width: 38px;
        height: 38px;
        border-radius: 10px;
    }

    .brand-name {
        font-size: 18px;
        font-weight: 700;
        background: linear-gradient(135deg, #2563EB, #1D4ED8);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .report-btn {
        background: linear-gradient(135deg, #2563EB, #1D4ED8);
        color: white;
        padding: 10px 24px;
        border-radius: 30px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .report-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(37,99,235,0.3);
    }

    /* MAIN CONTENT */
    .main-content {
        margin-left: 280px;
        padding: 32px 40px;
        max-width: 1200px;
    }

    /* Hero Section - BLUE */
    .hero {
        background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
        border-radius: 24px;
        padding: 32px 36px;
        margin-bottom: 32px;
        position: relative;
        overflow: hidden;
    }

    .hero::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -20%;
        width: 300px;
        height: 300px;
        background: rgba(255,255,255,0.08);
        border-radius: 50%;
    }

    .hero::after {
        content: '';
        position: absolute;
        bottom: -30%;
        left: -10%;
        width: 200px;
        height: 200px;
        background: rgba(255,255,255,0.05);
        border-radius: 50%;
    }

    .hero-title {
        font-size: 28px;
        font-weight: 700;
        color: white;
        margin-bottom: 8px;
        position: relative;
    }

    .hero-date {
        font-size: 13px;
        color: rgba(255,255,255,0.85);
        position: relative;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    /* Stats Grid */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 32px;
    }

    .stat-card {
        background: var(--surface);
        border-radius: 20px;
        padding: 20px;
        border: 1px solid var(--border);
        transition: all 0.2s;
    }

    .stat-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 24px rgba(37,99,235,0.1);
        border-color: #2563EB;
    }

    .stat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
    }

    .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
    }

    .stat-icon.your { background: #DBEAFE; }
    .stat-icon.progress { background: #DBEAFE; }
    .stat-icon.resolved { background: #DBEAFE; }
    .stat-icon.total { background: #DBEAFE; }

    .stat-value {
        font-size: 32px;
        font-weight: 800;
        color: var(--text);
        font-family: 'DM Mono', monospace;
        transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .stat-animate { animation: statsPop 0.3s ease; }
    @keyframes statsPop {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); color: #2563EB; }
        100% { transform: scale(1); }
    }

    .stat-label {
        font-size: 13px;
        color: var(--muted);
        margin-top: 8px;
        font-weight: 500;
    }

    /* Filter Bar - BLUE */
    .filter-bar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 28px;
    }

    .filter-chip {
        padding: 8px 20px;
        border-radius: 40px;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
    }

    .filter-chip:hover {
        border-color: #2563EB;
        color: #2563EB;
    }

    .filter-chip.active {
        background: #2563EB;
        border-color: #2563EB;
        color: white;
    }

    /* Section Header */
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 20px;
    }

    .section-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
    }

    .section-count {
        font-size: 13px;
        color: var(--muted);
    }

    /* Incident Cards */
    .incidents-grid {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .incident-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px 24px;
        transition: all 0.2s;
        cursor: pointer;
    }

    .incident-card:hover {
        transform: translateX(6px);
        border-color: #2563EB;
        box-shadow: 0 8px 24px rgba(37,99,235,0.08);
    }

    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
        flex-wrap: wrap;
        gap: 10px;
    }

    .incident-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
    }

    .incident-badges {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    .badge {
        padding: 4px 12px;
        border-radius: 30px;
        font-size: 11px;
        font-weight: 600;
    }

    .badge.security { background: #DBEAFE; color: #1D4ED8; }
    .badge.maintenance { background: #DBEAFE; color: #1D4ED8; }
    .badge.janitorial { background: #DBEAFE; color: #1D4ED8; }
    .badge.facilities { background: #DBEAFE; color: #1D4ED8; }
    .badge.high { background: #FEE2E2; color: #DC2626; }
    .badge.medium { background: #FEF3C7; color: #D97706; }
    .badge.low { background: #D1FAE5; color: #059669; }
    .badge.pending { background: #FEF3C7; color: #D97706; }
    .badge.progress { background: #DBEAFE; color: #2563EB; }
    .badge.resolved { background: #D1FAE5; color: #059669; }
    .badge.your { background: #EDE9FE; color: #7C3AED; }

    .incident-location {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 12px;
    }

    .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 10px;
    }

    .reporter-info {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
    }

    .timestamp {
        font-size: 11px;
        font-family: 'DM Mono', monospace;
        color: var(--muted);
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        background: var(--surface);
        border-radius: 24px;
        border: 2px dashed var(--border);
    }

    .empty-icon {
        font-size: 64px;
        margin-bottom: 16px;
        opacity: 0.5;
    }

    .empty-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .empty-sub {
        font-size: 13px;
        color: var(--muted);
    }

    /* MODAL */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
        backdrop-filter: blur(4px);
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-container {
        background: white;
        border-radius: 24px;
        width: 90%;
        max-width: 500px;
        max-height: 80vh;
        overflow-y: auto;
        transform: scale(0.9);
        transition: transform 0.3s;
    }
    .modal-overlay.active .modal-container { transform: scale(1); }
    .modal-header {
        padding: 20px 24px;
        background: #2563EB;
        color: white;
        border-radius: 24px 24px 0 0;
        display: flex;
        justify-content: space-between;
    }
    .modal-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
    .modal-body { padding: 24px; }
    .modal-row { margin-bottom: 16px; display: flex; flex-wrap: wrap; }
    .modal-label { width: 100px; font-weight: 600; color: #64748B; font-size: 12px; text-transform: uppercase; }
    .modal-value { flex: 1; font-size: 14px; color: #1E293B; }
    .modal-footer { padding: 16px 24px; display: flex; justify-content: flex-end; border-top: 1px solid #E2E8F0; }
    .modal-btn { padding: 8px 20px; border-radius: 30px; border: none; cursor: pointer; font-family: inherit; }
    .modal-btn-primary { background: #2563EB; color: white; }

    /* Notification */
    .notification {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 14px 24px;
        background: #2563EB;
        color: white;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 500;
        z-index: 1000;
        animation: slideIn 0.3s ease;
        box-shadow: 0 8px 24px rgba(37,99,235,0.3);
    }

    @keyframes slideIn {
        from { transform: translateX(400px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 900px) {
        .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
        .drawer { transform: translateX(-100%); }
        .drawer.open { transform: translateX(0); }
        .topbar, .main-content { margin-left: 0; width: 100%; }
        .topbar { padding: 12px 20px; }
        .main-content { padding: 20px; }
        .hamburger { display: flex; }
        .hero { padding: 20px; }
        .hero-title { font-size: 22px; }
        .stats-grid { gap: 12px; }
        .stat-card { padding: 14px; }
        .stat-value { font-size: 24px; }
        .incident-card { padding: 14px; }
        .card-header { flex-direction: column; }
        .drawer-overlay {
            display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            z-index: 250; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .drawer-overlay.open { opacity: 1; pointer-events: all; }
    }
    @media (min-width: 769px) {
        .hamburger { display: none; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #2563EB; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #1D4ED8; }
    a { color: #2563EB; text-decoration: none; }
    a:hover { color: #1D4ED8; }
</style>
</head>
<body>

<div class="drawer-overlay" id="overlay"></div>

<div class="drawer" id="drawer">
    <div class="drawer-header">
        <div class="drawer-avatar" id="avatarUpload">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </div>
        <div class="drawer-name" id="studentName">Loading...</div>
        <div class="drawer-role">Student</div>
    </div>
    <div class="drawer-nav">
        <button class="drawer-item active" data-page="dashboard">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
        </button>
        <button class="drawer-item" data-page="report">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
            New Report
        </button>
    </div>
    <div class="drawer-footer">
        <button class="drawer-logout" id="logoutBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
        </button>
    </div>
</div>

<header class="topbar">
    <div class="brand-logo">
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <img src="/Assets/Images/logo.png" alt="Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%232563EB\'%3E%3Cpath d=\'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5\'/%3E%3C/svg%3E'">
        <span class="brand-name">CampusCare</span>
    </div>
    <a class="report-btn" href="/Assets/Student_reporting/report.html">+ New Incident Report</a>
</header>

<div class="main-content">
    <div class="hero">
        <div class="hero-title" id="welcomeMessage">Welcome back! 👋</div>
        <div class="hero-date">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span id="currentDate"></span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-header"><div class="stat-icon your">📋</div></div><div class="stat-value" id="yourReportsCount">0</div><div class="stat-label">Your Reports</div></div>
        <div class="stat-card"><div class="stat-header"><div class="stat-icon progress">⚙️</div></div><div class="stat-value" id="inProgressCount">0</div><div class="stat-label">In Progress</div></div>
        <div class="stat-card"><div class="stat-header"><div class="stat-icon resolved">✓</div></div><div class="stat-value" id="resolvedCount">0</div><div class="stat-label">Resolved</div></div>
        <div class="stat-card"><div class="stat-header"><div class="stat-icon total">🏫</div></div><div class="stat-value" id="totalReportsCount">0</div><div class="stat-label">Total Campus Reports</div></div>
    </div>

    <div class="filter-bar">
        <button class="filter-chip active" data-filter="all">All Reports</button>
        <button class="filter-chip" data-filter="security">Security</button>
        <button class="filter-chip" data-filter="maintenance">Maintenance</button>
        <button class="filter-chip" data-filter="janitorial">Janitorial</button>
        <button class="filter-chip" data-filter="facilities">Facilities</button>
    </div>

    <div class="section-header"><h2 class="section-title">Recent Incidents</h2><span class="section-count" id="incidentsCount">0 reports</span></div>
    <div class="incidents-grid" id="incidentsContainer"></div>
</div>

<script>
    // ========== DATABASE & AUTHENTICATION ==========
    const STORAGE_KEY = 'campus_care_reports';
    let currentStudent = null;
    let currentFilter = 'all';
    let allIncidents = [];

    // SECURITY: Redirect to login if no student is logged in
    function checkAuth() {
        const stored = localStorage.getItem('currentStudent');
        if (!stored) {
            window.location.href = '/Assets/Student Authentication/Student.html';
            return false;
        }
        try {
            currentStudent = JSON.parse(stored);
            if (!currentStudent.name || !currentStudent.studentId) {
                window.location.href = '/Assets/Student Authentication/Student.html';
                return false;
            }
        } catch(e) {
            window.location.href = '/Assets/Student Authentication/Student.html';
            return false;
        }
        return true;
    }

    function loadIncidents() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored && stored !== '[]') {
            const reports = JSON.parse(stored);
            allIncidents = reports.map(r => ({
                id: r.id,
                name: r.title,
                location: r.location,
                category: r.category || 'maintenance',
                priority: r.priority || 'medium',
                status: r.status || 'pending',
                reporter: r.studentName,
                student_id: r.studentIdNumber,
                description: r.description || 'No description provided',
                timestamp: new Date(r.timestamp)
            }));
        } else {
            allIncidents = [];
        }
        renderIncidents();
        updateStats();
    }

    function getMyReports() {
        if (!currentStudent) return [];
        return allIncidents.filter(inc => inc.student_id === currentStudent.studentId);
    }

    function getFilteredReports() {
        let myReports = getMyReports();
        if (currentFilter !== 'all') {
            myReports = myReports.filter(r => r.category === currentFilter);
        }
        return myReports.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    }

    function renderIncidents() {
        const container = document.getElementById('incidentsContainer');
        const filtered = getFilteredReports();
        document.getElementById('incidentsCount').textContent = `${filtered.length} report${filtered.length !== 1 ? 's' : ''}`;
        
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No reports yet</div><div class="empty-sub">Click "New Incident Report" to submit your first report</div></div>`;
            return;
        }
        
        container.innerHTML = filtered.map(inc => `
            <div class="incident-card" onclick="viewIncident(${inc.id})">
                <div class="card-header">
                    <div class="incident-title">${escapeHtml(inc.name)}</div>
                    <div class="incident-badges">
                        <span class="badge ${inc.category}">${inc.category}</span>
                        <span class="badge ${inc.priority}">${inc.priority}</span>
                        <span class="badge ${inc.status === 'pending' ? 'pending' : inc.status === 'in-progress' ? 'progress' : 'resolved'}">${inc.status}</span>
                        <span class="badge your">Your Report</span>
                    </div>
                </div>
                <div class="incident-location">📍 ${escapeHtml(inc.location)}</div>
                <div class="card-footer">
                    <div class="reporter-info">👤 Reported by you</div>
                    <div class="timestamp">${getTimeAgo(inc.timestamp)}</div>
                </div>
            </div>
        `).join('');
    }

    function updateStats() {
        const myReports = getMyReports();
        const total = myReports.length;
        const inProgress = myReports.filter(r => r.status === 'in-progress').length;
        const resolved = myReports.filter(r => r.status === 'resolved').length;
        const totalCampus = allIncidents.length;
        
        animateStat('yourReportsCount', total);
        animateStat('inProgressCount', inProgress);
        animateStat('resolvedCount', resolved);
        document.getElementById('totalReportsCount').textContent = totalCampus;
    }

    function animateStat(id, val) {
        const el = document.getElementById(id);
        if (!el) return;
        const old = parseInt(el.textContent);
        el.textContent = val;
        if (old !== val) {
            el.classList.remove('stat-animate');
            void el.offsetWidth;
            el.classList.add('stat-animate');
            setTimeout(() => el.classList.remove('stat-animate'), 300);
        }
    }

    window.viewIncident = function(id) {
        const inc = allIncidents.find(i => i.id === id);
        if (!inc) return;
        document.getElementById('modalTitle').innerText = inc.name;
        document.getElementById('modalLocation').innerText = inc.location;
        document.getElementById('modalCategory').innerHTML = `<span class="badge ${inc.category}">${inc.category}</span>`;
        document.getElementById('modalPriority').innerHTML = `<span class="badge ${inc.priority}">${inc.priority}</span>`;
        document.getElementById('modalStatus').innerHTML = `<span class="badge ${inc.status === 'pending' ? 'pending' : inc.status === 'in-progress' ? 'progress' : 'resolved'}">${inc.status}</span>`;
        document.getElementById('modalDescription').innerText = inc.description;
        document.getElementById('modalDate').innerText = new Date(inc.timestamp).toLocaleString();
        document.getElementById('incidentModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    };
    window.closeModal = function() {
        document.getElementById('incidentModal').classList.remove('active');
        document.body.style.overflow = '';
    };

    function getTimeAgo(date) {
        const diff = Math.floor((Date.now() - new Date(date)) / 1000);
        const mins = Math.floor(diff / 60);
        const hrs = Math.floor(mins / 60);
        const days = Math.floor(hrs / 24);
        if (days > 0) return `${days}d ago`;
        if (hrs > 0) return `${hrs}h ago`;
        if (mins > 0) return `${mins}m ago`;
        return 'Just now';
    }
    function escapeHtml(t) { if (!t) return ''; return t.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function showNotification(msg) { const n = document.createElement('div'); n.className = 'notification'; n.textContent = msg; document.body.appendChild(n); setTimeout(() => n.remove(), 3000); }

    function setupUI() {
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburger');
        if (hamburger) hamburger.onclick = () => { drawer.classList.toggle('open'); overlay.classList.toggle('open'); };
        if (overlay) overlay.onclick = () => { drawer.classList.remove('open'); overlay.classList.remove('open'); };
        
        document.querySelectorAll('.filter-chip').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderIncidents();
            };
        });
        
        document.querySelectorAll('.drawer-item').forEach(item => {
            item.onclick = () => {
                if (item.dataset.page === 'report') {
                    localStorage.setItem('currentStudent', JSON.stringify(currentStudent));
                    window.location.href = '/Assets/Student_reporting/report.html';
                }
                drawer.classList.remove('open'); overlay.classList.remove('open');
            };
        });
        
        document.getElementById('logoutBtn').onclick = () => {
            if (confirm('Logout?')) { localStorage.removeItem('currentStudent'); window.location.href = '/Assets/Student Authentication/Student.html'; }
        };
        
        const avatar = document.getElementById('avatarUpload');
        if (avatar) {
            avatar.onclick = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => { avatar.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`; localStorage.setItem(`avatar_${currentStudent?.studentId}`, ev.target.result); showNotification('Profile picture updated!'); };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            };
            const saved = localStorage.getItem(`avatar_${currentStudent?.studentId}`);
            if (saved) avatar.innerHTML = `<img src="${saved}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
        }
        
        document.addEventListener('click', (e) => { if (window.innerWidth <= 768 && !drawer.contains(e.target) && !hamburger?.contains(e.target)) { drawer.classList.remove('open'); overlay.classList.remove('open'); } });
    }

    function init() {
        if (!checkAuth()) return;
        document.getElementById('studentName').textContent = currentStudent.name;
        document.getElementById('welcomeMessage').innerHTML = `Welcome back, ${currentStudent.name.split(' ')[0]}! 👋`;
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        loadIncidents();
        setupUI();
        window.addEventListener('storage', (e) => { if (e.key === STORAGE_KEY) { loadIncidents(); showNotification('New report received!'); } });
    }
    init();
</script>

<!-- INCIDENT DETAIL MODAL -->
<div id="incidentModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header"><h3>📋 Incident Details</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <div class="modal-body">
            <div class="modal-row"><div class="modal-label">Title</div><div class="modal-value" id="modalTitle"></div></div>
            <div class="modal-row"><div class="modal-label">Location</div><div class="modal-value" id="modalLocation"></div></div>
            <div class="modal-row"><div class="modal-label">Category</div><div class="modal-value" id="modalCategory"></div></div>
            <div class="modal-row"><div class="modal-label">Priority</div><div class="modal-value" id="modalPriority"></div></div>
            <div class="modal-row"><div class="modal-label">Status</div><div class="modal-value" id="modalStatus"></div></div>
            <div class="modal-row"><div class="modal-label">Description</div><div class="modal-value">📄 <span id="modalDescription"></span></div></div>
            <div class="modal-row"><div class="modal-label">Reported</div><div class="modal-value" id="modalDate"></div></div>
        </div>
        <div class="modal-footer"><button class="modal-btn modal-btn-primary" onclick="closeModal()">Close</button></div>
    </div>
</div>
</body>
</html>
