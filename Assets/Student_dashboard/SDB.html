<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Care — Incident Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/Assets/Student_dashboard/SDB.css">
<link rel="icon" href="/Assets/Images/logo.png" type="image/png">
</head>
<body>
<div class="drawer-overlay" id="overlay"></div>
<div class="drawer" id="drawer">
<div class="drawer-header">
    <div class="drawer-avatar">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.8">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
        </svg>
    </div>
    <div>
        <div class="drawer-name" id="studentName">Lebron James</div>
        <div class="drawer-role">Student</div>
    </div>
</div>
<nav class="drawer-nav">
    <button class="drawer-item active" data-page="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
        </svg>
        Dashboard
    </button>
    <div class="drawer-divider"></div>
    <button class="drawer-item" data-page="myreports">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Report new incident
    </button>
</nav>
<div class="drawer-footer">
    <button class="drawer-logout" id="logoutBtn" onclick="window.location.href='/Assets/Landing_page/land.html'"></button>>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
    </button>
</div>
</div>

<nav>
<div class="nav-brand">
    <button class="nav-hamburger" id="hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
    </button>
    <div class="nav-logo">
        <img src="/Assets/Images/logo.png" alt="Campus Care logo" width="36" height="36">
    </div>
    <div>
        <div class="nav-title">Campus Care</div>
        <div class="nav-sub">Report and Track Incident</div>
    </div>
</div>
    <a class="btn-report btn-report--desktop" href="/Assets/Student_reporting/report.html">+ New Report</a>
    <a class="btn-report btn-report--mobile" href="/Assets/Student_reporting/report.html">+ Report</a>
</nav>

<main>
    <div class="hero">
        <div class="hero-title">Incident Dashboard</div>
        <div class="hero-sub">See what's already reported before filling a new one</div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-num" id="yourReportsCount">0</div>
            <div class="stat-label">Your Reports</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="inProgressCount">0</div>
            <div class="stat-label">In progress reports</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="approvedCount">0</div>
            <div class="stat-label">Resolved Reports</div>
        </div>
    </div>

    <div class="filter-row">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="security">Security</button>
        <button class="filter-btn" data-filter="maintenance">Maintenance</button>
        <button class="filter-btn" data-filter="janitorial">Janitorial</button>
        <button class="filter-btn" data-filter="facilities">Facilities</button>
    </div>

    <div class="section-label">Recent Reports</div>

    <div class="incidents" id="incidentsContainer">
    </div>
</main>
<script src="/Assets/Student_dashboard/SDB.js"></script>
</body>
</html>
