<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Campus Care — Student Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/Assets/Images/logo.png" type="image/png">
<link rel="stylesheet" href="/Assets/Student_dashboard/SDB.css">
</head>
<body>

<div class="drawer-overlay" id="overlay"></div>

<div class="drawer" id="drawer">
    <div class="drawer-header">
        <div class="drawer-avatar" id="avatarUpload">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </div>
        <div class="drawer-name" id="studentName">Loading...</div>
        <div class="drawer-role">Student</div>
    </div>
    <div class="drawer-nav">
        <button class="drawer-item active" data-page="dashboard">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
        </button>
        <button class="drawer-item" data-page="report">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
            New Report
        </button>
    <hr class="drawer-divider">
    <button class="drawer-item" onclick="window.location.href='/Assets/Student_dashboard/setting/setting.html'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
            </svg>
            Settings
    </button>
    </div>
    <div class="drawer-footer">
        <button class="drawer-logout" id="logoutBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
        </button>
    </div>
</div>

<header class="topbar">
    <div class="brand-logo">
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <img src="/Assets/Images/logo.png" alt="Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http:/www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%232563EB\'%3E%3Cpath d=\'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5\'/%3E%3C/svg%3E'">
        <span class="brand-name">CampusCare</span>
    </div>
    <!-- REMOVED - New Incident Report Button -->
</header>

<div class="main-content">
    <div class="hero">
        <div class="hero-title" id="welcomeMessage">Welcome back! 👋</div>
        <div class="hero-date">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span id="currentDate"></span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-header">
                <div class="stat-icon your">📋</div>
            </div>
            <div class="stat-value" id="yourReportsCount">0</div>
            <div class="stat-label">Your Reports</div>
        </div>
        <div class="stat-card">
            <div class="stat-header">
                <div class="stat-icon progress">⚙️</div>
            </div>
            <div class="stat-value" id="inProgressCount">0</div>
            <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card">
            <div class="stat-header">
                <div class="stat-icon resolved">✓</div>
            </div>
            <div class="stat-value" id="resolvedCount">0</div>
            <div class="stat-label">Resolved</div>
        </div>
        <div class="stat-card">
            <div class="stat-header">
                <div class="stat-icon total">🏫</div>
            </div>
            <div class="stat-value" id="totalReportsCount">0</div>
            <div class="stat-label">Total Campus Reports</div>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-chip active" data-filter="all">All Reports</button>
        <button class="filter-chip" data-filter="security">Security</button>
        <button class="filter-chip" data-filter="maintenance">Maintenance</button>
        <button class="filter-chip" data-filter="janitorial">Janitorial</button>
        <button class="filter-chip" data-filter="facilities">Facilities</button>
    </div>

    <div class="section-header"><h2 class="section-title">Recent Incidents</h2><span class="section-count" id="incidentsCount">0 reports</span></div>
    <div class="incidents-grid" id="incidentsContainer"></div>
</div>

<!-- ============ BOTTOM NAVIGATION BAR (LIKE MOBILE APP) ============ -->
<nav class="bottom-nav" id="bottomNav">
    <button class="bottom-nav-item active" data-page="dashboard">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>Home</span>
    </button>
    <button class="bottom-nav-item" data-page="report">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 5v14M5 12h14"/>
            <circle cx="12" cy="12" r="9"/>
        </svg>
        <span>Report</span>
    </button>
    <button class="bottom-nav-item" data-page="settings">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
        </svg>
        <span>Settings</span>
    </button>
</nav>

<script type="module" src="/Assets/Student_dashboard/SDB.js"></script>

<!-- INCIDENT DETAIL MODAL -->
<div id="incidentModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header"><h3>📋 Incident Details</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <div class="modal-body">
            <div class="modal-row"><div class="modal-label">Title</div><div class="modal-value" id="modalTitle"></div></div>
            <div class="modal-row"><div class="modal-label">Location</div><div class="modal-value" id="modalLocation"></div></div>
            <div class="modal-row"><div class="modal-label">Category</div><div class="modal-value" id="modalCategory"></div></div>
            <div class="modal-row"><div class="modal-label">Priority</div><div class="modal-value" id="modalPriority"></div></div>
            <div class="modal-row"><div class="modal-label">Status</div><div class="modal-value" id="modalStatus"></div></div>
            <div class="modal-row"><div class="modal-label">Description</div><div class="modal-value">📄 <span id="modalDescription"></span></div></div>
            <div class="modal-row"><div class="modal-label">Reported</div><div class="modal-value" id="modalDate"></div></div>
        </div>
        <div class="modal-footer"><button class="modal-btn modal-btn-primary" onclick="closeModal()">Close</button></div>
    </div>
</div>

<script type="module" src="/Assets/Student_dashboard/SDB.js"></script>
</body>
</html>
