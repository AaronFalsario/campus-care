<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusCare</title>
    <link rel="stylesheet" href="/Assets/login/log.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" href="/Assets/IMAGES/logo.png" type="image/png">
</head>
<body>
<div class="mobile-container">
    <div class="header">
        <div class="app-icon">
            <img src="/Assets/IMAGES/logo.png" alt="App Icon">
        </div>
        <h1>CampusCare</h1>
        <p>Report and manage campus issues efficiently</p>
    </div>
<!--Role Selector-->
    <div class="role-selector">
        <button class="active" data-role="student">Student</button>
        <button data-role="admin">Admin</button>
    </div>

<!--Student Login-->
    <div class="login-card" id="studentLoginCard">
        <div class="user-icon"><i class="fas fa-user-pen"></i></div>
        <h2>Student Login</h2>
        <p>Welcome back! Please login to continue</p>

        <div class="input-group">
            <label>Email Address</label>
            <div class="input-icon">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Enter your email">
            </div>
        </div>

        <div class="input-group">
            <label>Password</label>
            <div class="input-icon password-container">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Enter your password" id="passwordInput">
                <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>
        </div>

        <button class="login-btn">Login</button>
        <p class="signup-text" id="signupPrompt">Don't have an account?</p>
        <button type="button" class="signup-btn" id="showSignup">Sign up</button>
        <button type="button" class="Forgot-password" id="showForgotPassword">Forgot Password?</button>
    </div>

<!--Admin login-->
    <div class="login-card admin-theme" id="adminLoginCard" style="display:none;">
        <div class="user-icon">🛡️</div>
        <h2>Admin Login</h2>
        <p>Access admin panel securely</p>

        <div class="input-group">
            <label>Email Address</label>
            <div class="input-icon">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Enter your email">
            </div>
        </div>

        <div class="input-group">
            <label>Password</label>
            <div class="input-icon password-container">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Enter your password" id="adminPasswordInput">
                <i class="fas fa-eye toggle-password" id="toggleAdminPassword"></i>
            </div>
        </div>
        <button class="login-btn admin-btn">Login</button>
        <button type="button" class="Adminforgot-btn" id="showAdminForgotPassword">Forgot Password?</button>
    </div>

<!--Student Sign Up-->
    <form id="signupForm" action="/Assets/STUDENTDB/SDB.html" method="post" style="display:none;">
        <div class="login-card">
            <div class="user-icon"><i class="fas fa-user-pen"></i></div>
            <h2>Student Sign Up</h2>
            <p>Create your student account</p>

            <div class="input-group">
                <label>Full Name</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="input-group">
                <label>Student ID</label>
                <div class="input-icon">
                    <i class="fas fa-hashtag"></i>
                    <input type="text" placeholder="Enter your student ID" required>
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-icon password-container">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="new-password" placeholder="Enter password" required>
                    <i class="fas fa-eye toggle-password" id="toggleSignupPassword"></i>
                </div>
            </div>

            <button type="submit" class="login-btn">Sign Up</button>
            <p class="signup-text">Already have an account?</p>
            <button type="button" id="showLogin" class="signup-btn">Login</button>
        </div>
    </form>
</div>          

<!--Loader Overlay-->
<div class="loader-overlay" id="loaderOverlay">
    <div class="loader-container">
        <div class="spinner"></div>
    </div>
</div>          

<footer>
    <p>&copy; 2023 Campus Care. All rights reserved.</p>
</footer>
<script type="module" src="/Assets/LOGIN/log.js"></script>
</body>
</html>
