<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Care -- Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="/Assets/Images/logo.png" type="image/png">
    <link rel="stylesheet" href="/Assets/login/admin/style.css">
    <base href="/">
</head>
<body>
    <div class="mobile-container">
        <div class="header">
            <div class="app-icon">
                <img src="/Assets/Images/logo.png" alt="App Icon">
            </div>
            <h1>CampusCare</h1>
            <p>Report and manage campus issues efficiently</p>
        </div>

        <!-- LOGIN CARD -->
        <div class="login-card admin-theme" id="adminLoginCard">
            <div class="user-icon">🛡️</div>
            <h2>Admin Login</h2>
            <p id="loginMessage">Access admin panel securely</p>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Enter your email" id="adminEmail">
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-icon password-container">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Enter your password" id="adminPasswordInput">
                </div>
            </div>
            <button class="login-btn admin-btn" id="adminLoginBtn">Login</button>
            <button type="button" class="Adminforgot-btn" id="showAdminForgotPassword">Forgot Password?</button>
        </div>

        <!-- SIGNUP CARD (HIDDEN BY DEFAULT - Revealed by pressing S then U) -->
        <div class="login-card admin-theme" id="adminSignupCard">
            <div class="user-icon">🛡️</div>
            <h2>Admin Registration</h2>
            <p id="signupMessage">Request admin access</p>

            <div class="input-group">
                <label>Full Name</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Enter your full name" id="adminName">
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Enter your email" id="adminSignupEmail">
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-icon password-container">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Create a password (min. 6 characters)" id="adminSignupPassword">
                </div>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <div class="input-icon password-container">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Confirm your password" id="adminConfirmPassword">
                </div>
            </div>

            <button class="login-btn admin-btn" id="adminSignupBtn">Request Access</button>
            <p class="signup-text">Already have an account?</p>
            <button type="button" id="showAdminLogin" class="signup-btn">Login</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2023 Campus Care. All rights reserved.</p>
    </footer>

    <!-- Toast notification -->
    <div id="adminToast" class="admin-toast">🔐 Admin access granted</div>

<script type="module" src="/Assets/login/admin/func.js"></script>
</body>
</html>
