<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reset Password - CampusCare</title>
    <link rel="stylesheet" href="/Assets/login/reset password/reset.css">
    <link rel="icon" href="/Assets/Images/logo.png">
    <base href="/">
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="header">
                <div class="app-icon">
                    <span>CC</span>
                </div>
                <h1>Reset Password</h1>
                <div class="subtitle">Enter your new password below</div>
            </div>

            <div class="input-group">
                <label>New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" placeholder="Enter new password (min. 6 characters)">
                    <span class="toggle-password" onclick="togglePassword('newPassword', this)">👁️</span>
                </div>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm your new password">
                    <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁️</span>
                </div>
            </div>

            <button class="reset-btn" id="resetBtn" onclick="updatePassword()">Update Password</button>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script type="module" src="/Assets/login/reset password/reset.js"></script>
</body>
</html>
